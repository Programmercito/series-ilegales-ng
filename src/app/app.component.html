<div class="app-shell">

  <!-- HEADER + NAV -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
          <path d="M12 20l5 5 11-10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="title-row">
          <h1 class="app-title">Verificador de Billetes</h1>
          <span class="beta-badge">BETA</span>
        </div>
        <p class="app-subtitle">Serie B — Banco Central</p>
      </div>
    </div>

    <nav class="app-nav">
      <a routerLink="/" routerLinkActive="nav-link--active"
         [routerLinkActiveOptions]="{exact:true}" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Escáner</span>
      </a>
      <a routerLink="/seriales" routerLinkActive="nav-link--active" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M3 15h18M9 3v18"/>
        </svg>
        <span>Seriales Ilegales</span>
      </a>
    </nav>
  </header>

  <!-- PAGE CONTENT -->
  <router-outlet></router-outlet>

  <!-- FOOTER -->
  <footer class="app-footer">
    <p class="footer-auto">Gestión automática — verificación 100% local</p>
    <p class="footer-love">Hecho con ❤️ por <a href="https://devcito.org" target="_blank" rel="noopener">devcito</a></p>
  </footer>

</div>
